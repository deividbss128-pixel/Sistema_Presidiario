# Nome da aplicacao Spring Boot 
spring.application.name=Sistema_Presidiario

# Configuracao do banco MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/BancoDados_CERESP
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracao do JPA 
spring.jpa.hibernate.ddl-auto=create
# mudar para upgrade depois

# Configuracoes de exibicao de SQL no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
